msg_followerDown: "{npc_name} is down!"

page_name: Good Company
page_description: Several utilities for you and your followers.
page_UI_name: "Good Company: UI"
page_UI_description: Settings for Good Company's UI.

toggles_groupName: Toggles
enableTeleport_name: Enable Teleporting
enableImmortality_name: Enable Immortal Followers
enableCatchUp_name: Enable Catch Up

blacklist_groupName: Blacklisting
teleportBlacklistMWScript_name: Disable Teleporting for Everyone with MWScripts
immortalityBlacklistMWScript_name: Disable Immortality for Everyone with MWScripts
catchUpBlacklistMWScript_name: Disable Catching Up for Everyone with MWScripts

immortality_groupName: Immortality
immortality_groupDesc: |
  Instead of dying, your followers will get knocked down until the end of combat.
  
  Doesn't affect summons.
ingoreCommanded_name: Ignore Followers Under Command Spells
ingoreCommanded_desc: Any Command effect, any magnitude.
threshold_name: Health Threshold
threshold_desc: At which health follower will get knocked down.
changeAggro_name: Change Enemy Aggro if the Follower is Down
changeAggro_desc: >
  If an enemy targets the downed follower, they will change aggro onto you.

call_groupName: Call
call_groupDesc: Keybind which teleports your followers to you.
callKeybind_name: Keybind
callKeybind_desc: |
  Teleports all your followers to you.
  
  Triggers only on release.
callAction_name: Call
callDistance_name: Teleportation Distance
callDistance_desc: |
  X > 0 = behind you,
  X < 0 = in front of you.

catchUp_groupName: Catch Up
catchUp_groupDesc: Gradually speeds up followers if they get too far.
startDist_name: Starting Distance
startDist_desc: Distance at which follower will start speeding up.
maxDist_name: Maximum Distance
maxDist_desc: Distance at which the follower will reach max speed.

UIWrapper_groupName: Wrapper Settings
enable_name: Enable Follower UI
pollingRate_name: UI Update Polling Rate (sec)
pollingRate_desc: Set it to zero to update UI every frame.
lockPosition_name: Lock Position
lockPosition_desc: |
  If disabled, you can:
  - drag the UI around by holding it with LMB
  - scale the UI by scrolling your mousewheel while dragging it
posX_name: X Position
posY_name: Y Position
expansionDirection_name: Expansion Direction
expansionDirection_desc: |
  Direction to which the UI will expand when new followers will be added.

  Start = Right/Bottom
  Center = Center
  End = Left/Top
enableBordersAndBg_name: Enable Borders and Background
horizontalLayout_name: Horizontal Layout

UIFollower_groupName: Follower Widgets
nameTextSize_name: Name Text Size
nameColor_name: Name Color
uiAlign_name: Element Alignment
healthBarEnabled_name: Enable Health Bar
healthBarColor_name: Health Bar Color
magickaBarEnabled_name: Enable Magicka Bar
magickaBarColor_name: Magicka Bar Color
fatigueBarEnabled_name: Enable Fatigue Bar
fatigueBarColor_name: Fatigue Bar Color
barLength_name: Bar Length
barWidth_name: Bar Width
barLabels_name: Enable Bar Labels
combatIcon_name: Enable Icons
combatIcon_desc: Equipped weapon, spell or a disease.
horizontalIcons_name: Stack Icons Horizontally
rightIcons_name: Stack Icons to the Right of Bars
immortalityIntegration_name: Immortality Integration
immortalityIntegration: >
  If enabled, when your follower gets down, the UI will properly display it.
